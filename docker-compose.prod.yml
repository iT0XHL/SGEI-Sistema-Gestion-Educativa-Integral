# ============================================================
# SGEI — Compose de PRODUCCIÓN (VPS Hostinger KVM 1)
#
# Las imágenes se construyen en GitHub Actions y se publican
# en GHCR; el VPS solo hace `pull` + `up` (no compila nada).
# Requiere un archivo .env junto a este compose — ver
# .env.production.example.
#
# Despliegue manual:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ── PostgreSQL 15 ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sgei-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sgei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-sgei_db}
    # Solo accesible desde localhost del VPS (psql/backups); los
    # contenedores usan la red interna. No exponer 5432 a internet.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - sgei-db-data:/var/lib/postgresql/data
      # Los scripts corren en orden alfabético del nombre destino,
      # SOLO cuando el volumen se crea desde cero (mismo orden que dev).
      - "./SQL/00-setup.sql:/docker-entrypoint-initdb.d/00-setup.sql:ro"
      - "./SQL/sgei_ddl_v2.1_auditado (1).sql:/docker-entrypoint-initdb.d/01-ddl.sql:ro"
      - "./SQL/01_notificaciones_eventos.sql:/docker-entrypoint-initdb.d/01a-notificaciones.sql:ro"
      - "./SQL/03-libretas-migration.sql:/docker-entrypoint-initdb.d/01b-libretas.sql:ro"
      - "./SQL/04-fix-audit-trigger.sql:/docker-entrypoint-initdb.d/01c-fix-audit.sql:ro"
      - "./SQL/05-simulacro-banco.sql:/docker-entrypoint-initdb.d/01d-simulacro-banco.sql:ro"
      - "./SQL/02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro"
      - "./SQL/06-grados-niveles.sql:/docker-entrypoint-initdb.d/03-grados-niveles.sql:ro"
      - "./SQL/07-horarios-publicacion.sql:/docker-entrypoint-initdb.d/04-horarios-publicacion.sql:ro"
      - "./SQL/08-horarios-descanso.sql:/docker-entrypoint-initdb.d/05-horarios-descanso.sql:ro"
      - "./SQL/09-competencia-grado.sql:/docker-entrypoint-initdb.d/06-competencia-grado.sql:ro"
      - "./SQL/10-seed-demo-completo.sql:/docker-entrypoint-initdb.d/07-seed-demo-completo.sql:ro"
      - "./SQL/11-nivel-horario-config.sql:/docker-entrypoint-initdb.d/08-nivel-horario-config.sql:ro"
      - "./SQL/12-nivel-horario-total-horas.sql:/docker-entrypoint-initdb.d/09-nivel-horario-total-horas.sql:ro"
      - "./SQL/13-horarios-completos.sql:/docker-entrypoint-initdb.d/10-horarios-completos.sql:ro"
      - "./SQL/14-cursos-por-nivel.sql:/docker-entrypoint-initdb.d/11-cursos-por-nivel.sql:ro"
      - "./SQL/15-docentes-por-area.sql:/docker-entrypoint-initdb.d/12-docentes-por-area.sql:ro"
      - "./SQL/16-horario-completo-nuevo.sql:/docker-entrypoint-initdb.d/13-horario-completo-nuevo.sql:ro"
      - "./SQL/17-eliminar-docentes-sin-horario.sql:/docker-entrypoint-initdb.d/14-eliminar-docentes-sin-horario.sql:ro"
      - "./SQL/18-competencias-cursos-nuevos.sql:/docker-entrypoint-initdb.d/15-competencias-cursos-nuevos.sql:ro"
      - "./SQL/19-area-academica-criterios.sql:/docker-entrypoint-initdb.d/16-area-academica-criterios.sql:ro"
      - "./SQL/20-regenerar-bimestre1-catalogo-nuevo.sql:/docker-entrypoint-initdb.d/17-regenerar-bimestre1-catalogo-nuevo.sql:ro"
      - "./SQL/21-limpieza-post-borrado-docentes.sql:/docker-entrypoint-initdb.d/18-limpieza-post-borrado-docentes.sql:ro"
      - "./SQL/22-formato-siagie-area-academica.sql:/docker-entrypoint-initdb.d/19-formato-siagie-area-academica.sql:ro"
      - "./SQL/23-competencias-estandar-4-criterios.sql:/docker-entrypoint-initdb.d/20-competencias-estandar-4-criterios.sql:ro"
      - "./SQL/24-token-recuperacion.sql:/docker-entrypoint-initdb.d/21-token-recuperacion.sql:ro"
      - "./SQL/25-limpieza-cursos-genericos.sql:/docker-entrypoint-initdb.d/22-limpieza-cursos-genericos.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sgei} -d ${POSTGRES_DB:-sgei_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - sgei-network

  # ── Backend (Next.js API :3001) ────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/it0xhl/sgei-backend:latest}
    container_name: sgei-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Variables opcionales (SUPABASE_URL, SUPABASE_SERVICE_KEY, CRON_SECRET,
    # RESEND_API_KEY, EMAIL_FROM) se agregan en el .env y llegan por env_file.
    # OJO: no dejes SUPABASE_URL= vacío en el .env (el backend valida que sea
    # URL); si no usas Supabase, no declares la variable.
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-sgei}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sgei_db}"
      DIRECT_URL: "postgresql://${POSTGRES_USER:-sgei}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sgei_db}"
      NODE_ENV: "production"
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET en .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      JWT_COOKIE_NAME: ${JWT_COOKIE_NAME:-sgei_token}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?Define FRONTEND_ORIGIN en .env}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-5}
      # COOKIE_SECURE=false permite login por HTTP (IP sin dominio/SSL).
      # Con dominio + HTTPS, déjalo en true.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      # Persistir uploads (PDFs, vouchers) — bind mount para backup vía scp/rsync
      - ./uploads:/app/public/uploads
    networks:
      - sgei-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend (nginx sirviendo el SPA) ──────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/it0xhl/sgei-frontend:latest}
    container_name: sgei-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - sgei-network

volumes:
  sgei-db-data:

networks:
  sgei-network:
    driver: bridge
