# ============================================================
# SGEI — Compose de PRODUCCIÓN (VPS Hostinger KVM 1)
#
# Las imágenes se construyen en GitHub Actions y se publican
# en GHCR; el VPS solo hace `pull` + `up` (no compila nada).
# Requiere un archivo .env junto a este compose — ver
# .env.production.example.
#
# Despliegue manual:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ── PostgreSQL 15 ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sgei-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sgei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-sgei_db}
    # Solo accesible desde localhost del VPS (psql/backups); los
    # contenedores usan la red interna. No exponer 5432 a internet.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - sgei-db-data:/var/lib/postgresql/data
      # SQL CONSOLIDADO (fuente de verdad, idéntico a docker-compose.yml de dev).
      # Corre en orden alfabético del nombre destino, SOLO al crear el volumen
      # desde cero. Incluye ya todas las migraciones (debe_cambiar_password,
      # índices, etc.), así que prod queda 1:1 con dev.
      - "./SQL/consolidated/setup.sql:/docker-entrypoint-initdb.d/00-setup.sql:ro"
      - "./SQL/consolidated/ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql:ro"
      - "./SQL/consolidated/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sgei} -d ${POSTGRES_DB:-sgei_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - sgei-network

  # ── Backend (Next.js API :3001) ────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/it0xhl/sgei-backend:latest}
    container_name: sgei-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Variables opcionales (SUPABASE_URL, SUPABASE_SERVICE_KEY, CRON_SECRET,
    # RESEND_API_KEY, EMAIL_FROM) se agregan en el .env y llegan por env_file.
    # OJO: no dejes SUPABASE_URL= vacío en el .env (el backend valida que sea
    # URL); si no usas Supabase, no declares la variable.
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-sgei}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sgei_db}"
      DIRECT_URL: "postgresql://${POSTGRES_USER:-sgei}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sgei_db}"
      NODE_ENV: "production"
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET en .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      JWT_COOKIE_NAME: ${JWT_COOKIE_NAME:-sgei_token}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?Define FRONTEND_ORIGIN en .env}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-5}
      # COOKIE_SECURE=false permite login por HTTP (IP sin dominio/SSL).
      # Con dominio + HTTPS, déjalo en true.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      # Persistir uploads (PDFs, vouchers) — bind mount para backup vía scp/rsync
      - ./uploads:/app/public/uploads
    networks:
      - sgei-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend (nginx sirviendo el SPA) ──────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/it0xhl/sgei-frontend:latest}
    container_name: sgei-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - sgei-network

volumes:
  sgei-db-data:

networks:
  sgei-network:
    driver: bridge
