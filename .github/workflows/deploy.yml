# ============================================================
# SGEI CI/CD — Build (GHCR) + Deploy a Hostinger VPS
#
#   push a master
#     → build imágenes de producción (backend y frontend) → GHCR
#     → scp del compose + SQL consolidado + .env.example al VPS
#     → SSH: docker compose pull && up -d
#
# El VPS NO compila (clave en un KVM 1). Solo descarga imágenes.
# ============================================================
name: SGEI CI/CD

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/sgei-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/sgei-frontend

jobs:
  # ── 1) Build & push de imágenes a GHCR ─────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Crea un builder con driver docker-container (necesario para la
      # caché type=gha; el driver 'docker' por defecto no la soporta).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR exige nombres de imagen en minúsculas; el owner puede tener
      # mayúsculas (iT0XHL). Recalcula BACKEND_IMAGE/FRONTEND_IMAGE en minúsculas.
      - name: Normalizar nombres de imagen a minúsculas
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/$OWNER_LC/sgei-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/$OWNER_LC/sgei-frontend" >> "$GITHUB_ENV"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2) Deploy al VPS por SSH ───────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/sgei' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Copia el compose y el .env de ejemplo al directorio de despliegue.
      - name: Copiar compose + .env.example al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: "docker-compose.prod.yml,.env.production.example"
          target: ${{ env.DEPLOY_PATH }}

      # Copia el SQL consolidado (se monta en la BD la primera vez).
      - name: Copiar SQL consolidado al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: "SQL/"
          target: ${{ env.DEPLOY_PATH }}/SQL

      - name: Desplegar (pull + up)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          # GHCR_PAT es OPCIONAL: solo si dejas los paquetes de GHCR privados.
          # Si los haces públicos (recomendado), no hace falta.
          envs: GHCR_PAT,GHCR_USER
          script: |
            set -e
            export GHCR_PAT="${{ secrets.GHCR_PAT }}"
            export GHCR_USER="${{ github.repository_owner }}"
            cd ${{ env.DEPLOY_PATH }}

            # Login a GHCR solo si los paquetes son privados.
            if [ -n "$GHCR_PAT" ]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi

            # En el primer despliegue no existe .env: lo creamos del ejemplo,
            # avisamos y salimos para que edites los secretos.
            if [ ! -f .env ]; then
              cp .env.production.example .env
              echo "⚠  Se creó .env desde el ejemplo en ${{ env.DEPLOY_PATH }}."
              echo "   Edita POSTGRES_PASSWORD, JWT_SECRET y FRONTEND_ORIGIN y vuelve a desplegar."
              exit 1
            fi

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
