services:
  db:
    image: postgres:15-alpine
    container_name: sgei-db
    environment:
      POSTGRES_USER: sgei
      POSTGRES_PASSWORD: sgei
      POSTGRES_DB: sgei_db
    ports:
      - "5432:5432"
    volumes:
      - sgei-db-data:/var/lib/postgresql/data
      - "./SQL/consolidated/setup.sql:/docker-entrypoint-initdb.d/00-setup.sql:ro"
      - "./SQL/consolidated/ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql:ro"
      - "./SQL/consolidated/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgei -d sgei_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - sgei-network

  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    container_name: sgei-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://sgei:sgei@db:5432/sgei_db"
      DIRECT_URL: "postgresql://sgei:sgei@db:5432/sgei_db"
      NODE_ENV: "development"
      JWT_SECRET: "dev-secret-cambiar-en-produccion-minimo-64-caracteres-1234567890abcdef"
      JWT_EXPIRES_IN: "8h"
      JWT_COOKIE_NAME: "sgei_token"
      BCRYPT_SALT_ROUNDS: "12"
      FRONTEND_ORIGIN: "http://localhost:3000"
      MAX_FILE_SIZE_MB: "10"
      # Almacenamiento local
      STORAGE_PATH: "/app/public/uploads"
      APP_URL: "http://localhost:3001"
      WATCHPACK_POLLING: "true"
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/.next
      - ./uploads:/app/public/uploads
    networks:
      - sgei-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    container_name: sgei-frontend
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - sgei-network

volumes:
  sgei-db-data:

networks:
  sgei-network:
    driver: bridge
